"$schema" = 'https://starship.rs/config-schema.json'
add_newline = true
palette = 'catppuccin_mocha'

format = """
$directory\
$git_branch\
$git_status\
$nodejs$python$rust$golang$c\
$cmd_duration\
$line_break\
$character"""

right_format = """$time"""

[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true
read_only = "  "
format = "[ $path ]($style)[$read_only]($read_only_style)"

[git_branch]
symbol = " "
style = "bold mauve"
format = "[$symbol$branch ]($style)"

[git_status]
style = "bold red"
format = "([$all_status$ahead_behind]($style) )"

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"
vimcmd_symbol = "[](bold yellow)"

[cmd_duration]
min_time = 500
style = "bold yellow"
format = "[ $duration]($style) "

[time]
disabled = false
format = "[  $time ]($style)"
style = "bold subtext"
time_format = "%H:%M"

[nodejs]
symbol = " "
style = "bold green"
[python]
symbol = " "
style = "bold yellow"
[rust]
symbol = " "
style = "bold peach"
[golang]
symbol = " "
style = "bold sapphire"
[c]
symbol = " "
style = "bold blue"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext   = "#a6adc8"
overlay   = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"
