# Fix volume "che torna indietro" sul vivavoce Sennheiser SP 20 for Lync.
# Il device gestisce il volume in hardware/HID: quando cambi il volume software
# il firmware rimanda il suo valore e WirePlumber lo riapplica -> il volume
# torna come prima. Forzando il mixer software (api.alsa.soft-mixer = true) la
# modifica software diventa autoritativa e non viene piu' sovrascritta.
#
# Match sul nome ALSA della card (vedi: wpctl inspect <id> | grep api.alsa.card.name).

monitor.alsa.rules = [
  {
    matches = [
      { "node.name" = "~alsa_output.usb-1395_Sennheiser_SP_20_for_Lync.*" }
    ]
    actions = {
      update-props = {
        "api.alsa.soft-mixer" = true
      }
    }
  }
]
