# ╔═══════════════════════════════════════════════════════╗
# ║  hyprlock — lockscreen (Fase 8)  ·  Tokyo Night        ║
# ║  Sfondo = screenshot sfocato (blur)                    ║
# ╚═══════════════════════════════════════════════════════╝

general {
    hide_cursor = true
    grace = 0
    ignore_empty_input = true
}

# ── Sfondo: cattura lo schermo e lo sfuma ──────────────
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.012
    contrast = 0.9
    brightness = 0.7
    vibrancy = 0.17
}

# ── Orologio grande ────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(c0caf5ff)          # fg
    font_size = 90
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(1a1b26cc)
}

# ── Data ───────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A %d %B')"
    color = rgba(a9b1d6ff)          # subtext
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 110
    halign = center
    valign = center
}

# ── Avatar / nome utente ───────────────────────────────
label {
    monitor =
    text =   $USER
    color = rgba(7aa2f7ff)          # blue (accento)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 50
    halign = center
    valign = center
}

# ── Campo password ─────────────────────────────────────
input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    rounding = 12

    outer_color = rgba(7aa2f7ff)        # blue bordo
    inner_color = rgba(1a1b26cc)        # bg
    font_color  = rgba(c0caf5ff)        # fg
    check_color = rgba(9ece6aff)        # green = verifica
    fail_color  = rgba(f7768eff)        # red  = errato

    placeholder_text = <span foreground="##565f89">  Password…</span>
    fail_text = <span foreground="##f7768e">  $FAIL ($ATTEMPTS)</span>
    hide_input = false
    position = 0, -40
    halign = center
    valign = center

    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(1a1b26aa)
}
