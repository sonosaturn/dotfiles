# ── Aspetto · Catppuccin Mocha ─────────────────────────
general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2

    # Bordo attivo: gradiente mauve → blue
    col.active_border = rgba(cba6f7ee) rgba(89b4faee) 45deg
    col.inactive_border = rgba(45475aaa)

    resize_on_border = true
    extend_border_grab_area = 20   # area (invisibile) per afferrare il bordo col mouse
    hover_icon_on_border = true     # cursore di resize quando passi sul bordo
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.95

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        vibrancy = 0.17
    }

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(11111baa)
    }
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}
