# Regole finestre — vedi https://wiki.hypr.land/Configuring/Window-Rules/

# Esempi utili (decommentare quando servono le app)
# NB: sintassi suppressevent/nofocus in 0.55 da rivedere (Fase 1 · regole per-app)
# windowrule = float, class:^(pavucontrol)$
# windowrule = float, class:^(nm-connection-editor)$
# windowrule = float, class:^(blueman-manager)$

# hyprbars (Fase 11/B): niente titlebar sulle app che hanno già i propri controlli (CSD).
# Classi confermate dall'utente / dal vivo. Spotify e mpv restano CON hyprbars.
# NB: su Wayland l'opzione "barra di sistema" di Brave non cede le decorazioni → doppia
# barra; quindi Brave resta escluso (tiene i propri controlli, minimali).
windowrule {
    name = hyprbars-no-csd
    match:class = ^(brave-browser|crx_.*|firefox|discord|VSCodium|obsidian|org\.gnome\.Meld)$
    hyprbars:no_bar = true
}
