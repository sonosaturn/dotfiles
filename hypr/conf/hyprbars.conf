# hyprbars — titlebar con pulsanti (sotto-progetto B).
# Colori via $var → matugen: rigenerate (oggi Tokyo Night).
$bar_bg = rgb(16161e)
$bar_fg = rgb(c0caf5)
$accent = rgb(7aa2f7)
$red    = rgb(f7768e)

plugin {
    hyprbars {
        bar_height = 26
        bar_part_of_window = true
        bar_precedence_over_border = true
        bar_color = $bar_bg
        col.text  = $bar_fg
        bar_title_enabled = true
        bar_text_size = 12
        bar_text_font = JetBrainsMono Nerd Font
        bar_text_align = left
        bar_buttons_alignment = right
        bar_button_padding = 8
        bar_padding = 10
        # bgcolor, size, glifo, on-click, fgcolor — da destra: chiudi, max, minimizza
        hyprbars-button = $red,    13, ✕, hyprctl dispatch killactive, $bar_bg
        hyprbars-button = $accent, 13, □, hyprctl dispatch fullscreen, $bar_bg
        hyprbars-button = $accent, 13, —, hyprctl dispatch movetoworkspacesilent special:minimized, $bar_bg
    }
}
