# Monitor — vedi https://wiki.hypr.land/Configuring/Monitors/
# Sintassi: monitor = nome, risoluzione@refresh, posizione, scala
#
# Disposizione FISICA: DP-4 (2560x1440, 60Hz) a SINISTRA · DP-3 (1920x1080, 144Hz) a DESTRA.
# Allineamento verticale: BOTTOM (bordi inferiori a filo, come stanno sul desk).
#   DP-3 parte a y=360 perche' 1440-1080=360 → i bordi bassi coincidono.
#   Cosi' il mouse attraversa senza "saltare/bloccarsi" nella zona dove i due
#   schermi si sovrappongono fisicamente. La zona morta resta solo in alto a SX
#   (i 360px superiori del Dell, dove l'MSI non arriva: e' fisicamente corretto).
#   Per centrarli invece: DP-3 a "2560x180". Per top: DP-3 a "2560x0".

monitor = DP-4, 2560x1440@59.95, 0x0, 1
monitor = DP-3, 1920x1080@144, 2560x360, 1

# Fallback per eventuali monitor non elencati
monitor = , preferred, auto, 1
