# Monitor — vedi https://wiki.hypr.land/Configuring/Monitors/
# Sintassi: monitor = nome, risoluzione@refresh, posizione, scala
#
# Disposizione FISICA: DP-4 (2560x1440, 60Hz) a SINISTRA · DP-3 (1920x1080, 144Hz) a DESTRA.
# Allineamento verticale: CENTRO (DP-3 a y=180, (1440-1080)/2=180).
#   I centri dei due schermi coincidono → il mouse attraversa fluido nella
#   fascia centrale. La zona morta (i 360px in più del Dell) e' divisa
#   simmetrica: 180px in alto + 180px in basso.
#   Per allineare in basso: DP-3 a "2560x360". Per top: DP-3 a "2560x0".

monitor = DP-4, 2560x1440@59.95, 0x0, 1
monitor = DP-3, 1920x1080@144, 2560x180, 1

# Fallback per eventuali monitor non elencati
monitor = , preferred, auto, 1
