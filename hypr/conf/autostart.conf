# Autostart — processi avviati con Hyprland
exec-once = waybar

# Notifiche (Fase 6) — mako = demone notifiche (swaync non installato)
exec-once = mako
# OSD volume/luminosità (Fase 6)
exec-once = swayosd-server

# Clipboard manager (Fase 3)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Wallpaper video (Fase 5) — ripristina l'ultimo sfondo impostato
exec-once = ~/.config/hypr/scripts/wallpaper.sh --restore

# Idle / lockscreen (Fase 8) — lock+DPMS off, no suspend
exec-once = hypridle

# Quickshell desktop widgets (Fase 9a)
exec-once = qs   # Quickshell: widget desktop (Fase 9a)

# Da aggiungere man mano che installiamo:
# exec-once = hyprpolkitagent      # autenticazione grafica
