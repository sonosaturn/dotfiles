# ── Variabili programmi ────────────────────────────────
$mainMod = SUPER
$terminal = kitty
$menu = rofi -show drun
$fileManager = thunar   # NB: non ancora installato (Fase futura)

# ── App / sessione ─────────────────────────────────────
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, exec, ~/.config/hypr/scripts/winhide.sh smart
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, F, fullscreen,

# ── Lockscreen (Fase 8) — SUPER+L è già focus dx ──────
bind = $mainMod CTRL, L, exec, loginctl lock-session

# ── Screenshot (Fase 9) ───────────────────────────────
bind =       , Print, exec, ~/.config/hypr/scripts/screenshot.sh region   # area → salva+clipboard
bind = SHIFT , Print, exec, ~/.config/hypr/scripts/screenshot.sh output   # monitor attivo
bind = CTRL  , Print, exec, ~/.config/hypr/scripts/screenshot.sh window   # finestra attiva
bind = $mainMod, Print, exec, ~/.config/hypr/scripts/screenshot.sh edit   # area → annota (swappy)
bind = $mainMod SHIFT, P, exec, ~/.config/hypr/scripts/screenshot.sh menu    # menu screenshot (no tasto Print)

# ── Color picker (Fase 9) ─────────────────────────────
bind = $mainMod SHIFT, C, exec, ~/.config/hypr/scripts/colorpicker.sh

# ── Wallpaper (Fase 5) ────────────────────────────────
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/wallpaper.sh --next

# ── Power menu / clipboard ────────────────────────────
# Power menu = tab "Sessione" della dashboard (SUPER+D); wlogout rimosso
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy

# ── Focus (frecce + vim) ──────────────────────────────
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, h, exec, ~/.config/hypr/scripts/winhide.sh hide
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# ── Sposta finestra ───────────────────────────────────
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# ── Workspace 1-10 ────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ── Scratchpad / "minimizza" ──────────────────────────
# SUPER+SHIFT+S = minimizza la finestra attiva (parcheggio silenzioso, la vista resta)
# SUPER+S       = mostra/nascondi lo scratchpad (ripristino)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspacesilent, special:magic

# ── Minimize / background (Fase 11) ───────────────────
# SUPER+H        = nascondi la finestra attiva in special:minimized (resta viva)
# SUPER+C        = chiudi; ma le app in hypr/winhide.list (es. Spotify) vengono nascoste
# SUPER+SHIFT+H  = recupero: mostra/nascondi il workspace delle minimizzate
bind = $mainMod SHIFT, H, togglespecialworkspace, minimized

# ── Scroll tra workspace ──────────────────────────────
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# ── Mouse: sposta / ridimensiona ──────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Control Center (Fase 9b) ─────────────────────────
bind = SUPER, D, global, quickshell:controlcenter

# ── Mixer audio (pavucontrol) ─────────────────────────
bind = $mainMod SHIFT, A, exec, pavucontrol

# ── Notifiche (Fase 6) ────────────────────────────────
bind = $mainMod, N, exec, swaync-client -t -sw          # apri/chiudi notification center
bind = $mainMod SHIFT, N, exec, swaync-client -d -sw    # toggle Non disturbare

# ── Tasti multimediali (volume/luminosità via swayosd → OSD a schermo) ──
bindel = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise --max-volume 100
bindel = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower
bindl  = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle
# Luminosità: nessun /sys/class/backlight su questo setup (monitor esterni DP) → swayosd --brightness è no-op.
# Riattivare con un backend DDC/CI (ddcutil) se in futuro serve regolare la luminosità dei monitor da tastiera.
# bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
# bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous
