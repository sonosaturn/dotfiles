# ╔═══════════════════════════════════════════════════════╗
# ║  hypridle — gestione idle (Fase 8)                     ║
# ║  Desktop fisso: lock + DPMS off, NIENTE suspend        ║
# ╚═══════════════════════════════════════════════════════╝

general {
    lock_cmd = pidof hyprlock || hyprlock       # evita lock multipli
    before_sleep_cmd = loginctl lock-session    # blocca prima di sospendere (se mai)
    after_sleep_cmd = hyprctl dispatch dpms on  # riaccendi gli schermi al risveglio
}

# ── 10 min → lock ──────────────────────────────────────
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# ── 15 min → schermi off (DPMS) ────────────────────────
listener {
    timeout = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Niente suspend: desktop fisso sempre acceso (vedi RICING.md Fase 8).
# Per aggiungerlo in futuro:
# listener {
#     timeout = 1800
#     on-timeout = systemctl suspend
# }
